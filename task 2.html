<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VVIP Music Player</title>

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Player Card */
.player {
    width: 350px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    text-align: center;
    color: white;
}

/* Album Cover */
.cover {
    width: 100%;
    height: 200px;
    border-radius: 15px;
    background: url("https://picsum.photos/400/300") center/cover;
    margin-bottom: 15px;
}

/* Song Title */
h2 {
    margin: 5px 0;
}

h4 {
    margin: 0;
    color: #ccc;
}

/* Controls */
.controls button {
    background: none;
    border: none;
    color: white;
    font-size: 22px;
    margin: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.controls button:hover {
    color: #00ffcc;
    transform: scale(1.2);
}

/* Progress */
input[type="range"] {
    width: 100%;
}

/* Playlist */
ul {
    list-style: none;
    padding: 0;
    margin-top: 10px;
    max-height: 120px;
    overflow-y: auto;
}

li {
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

li:hover {
    background: rgba(255,255,255,0.1);
}

.active {
    background: rgba(0,255,200,0.3);
}

</style>
</head>

<body>

<div class="player">

<div class="cover" id="cover"></div>

<h2 id="song-title">Select Song</h2>
<h4 id="artist">---</h4>

<audio id="audio"></audio>

<div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="playPause()">▶</button>
    <button onclick="nextSong()">⏭</button>
</div>

<input type="range" id="progress" value="0">
<input type="range" id="volume" min="0" max="1" step="0.1">

<ul id="playlist"></ul>

</div>

<script>

const songs = [
{
    title: "Relaxing Music",
    artist: "Nature",
    cover: "https://picsum.photos/id/1015/400/300",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
},
{
    title: "Energy Beat",
    artist: "DJ Mix",
    cover: "https://picsum.photos/id/1011/400/300",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
},
{
    title: "Calm Piano",
    artist: "Instrumental",
    cover: "https://picsum.photos/id/1016/400/300",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
}
];

const audio = document.getElementById("audio");
const title = document.getElementById("song-title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");
const playlist = document.getElementById("playlist");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");

let currentSong = 0;

/* Create Playlist */
songs.forEach((song, i) => {
    const li = document.createElement("li");
    li.innerText = song.title;
    li.onclick = () => loadSong(i);
    playlist.appendChild(li);
});

/* Load Song */
function loadSong(i) {
    currentSong = i;
    audio.src = songs[i].src;
    title.innerText = songs[i].title;
    artist.innerText = songs[i].artist;
    cover.style.backgroundImage = `url(${songs[i].cover})`;
    audio.play();
}

/* Controls */
function playPause() {
    if(audio.paused) audio.play();
    else audio.pause();
}

function nextSong() {
    currentSong = (currentSong + 1) % songs.length;
    loadSong(currentSong);
}

function prevSong() {
    currentSong = (currentSong - 1 + songs.length) % songs.length;
    loadSong(currentSong);
}

/* Progress Bar */
audio.ontimeupdate = () => {
    progress.value = (audio.currentTime / audio.duration) * 100;
};

progress.oninput = () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
};

/* Volume */
volume.oninput = () => {
    audio.volume = volume.value;
};

</script>

</body>
</html>
